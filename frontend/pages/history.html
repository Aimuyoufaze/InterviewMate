<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Interview Mate — 历史记录</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Instrument+Serif:ital@0;1&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="../css/style.css">
<script type="module" src="../js/sidebar.js"></script>
<script type="module" src="../js/history.js"></script>
</head>
<body>

<div id="app">

<header>
  <h1>Interview <i>Mate</i></h1>
  <div class="nav">
    <button id="langToggle" title="切换语言">🇨🇳</button>
  </div>
</header>

<div class="app-container">

  <nav class="sidebar" id="sidebar">
    <div class="nav-list">
      <button class="nav-item" data-view="chat">
        <span class="nav-icon">💬</span>
        <span class="nav-label" data-i18n="nav.chat">对话</span>
      </button>
      <button class="nav-item" data-view="interview">
        <span class="nav-icon">🎯</span>
        <span class="nav-label" data-i18n="nav.interview">模拟面试</span>
      </button>
      <button class="nav-item active" data-view="history">
        <span class="nav-icon">📋</span>
        <span class="nav-label" data-i18n="nav.history">历史记录</span>
      </button>
    </div>

    <div class="sidebar-footer">
      <div class="sidebar-user">
        <div class="user-avatar" id="sidebarAvatar">👤</div>
        <div class="user-info">
          <span class="user-name" id="sidebarUserName">User</span>
          <span class="user-resume" id="sidebarResumeStatus" data-i18n="sidebar.resume_status">简历：未上传</span>
        </div>
      </div>
      <div class="sidebar-actions">
        <button class="btn btn-sm btn-outline" id="sidebarProfileBtn" data-i18n="sidebar.profile">📝 编辑资料</button>
        <button class="btn btn-sm btn-outline" id="sidebarAgentBtn" data-i18n="sidebar.agent">配置 Agent</button>
      </div>
    </div>
  </nav>

  <main class="content">

    <div class="view-container" id="view-history">
      <div class="chat-header">
        <h2 data-i18n="history.title">面试历史</h2>
      </div>
      <div class="messages">
        <div id="historyList"></div>
        <div id="historyDetail" style="display:none"></div>
      </div>
    </div>

  </main>

</div>
</div>

<!-- 弹窗：用户资料编辑 -->
<div class="modal-overlay" id="profileModal">
  <div class="modal" style="max-width:440px">
    <h2 data-i18n="profile.title">编辑资料</h2>
    <div class="form-group">
      <label data-i18n="profile.name_label">你的名字</label>
      <input type="text" id="profileNameInput" style="width:100%;padding:8px 12px;border:1px solid var(--line);border-radius:8px;font-size:14px;margin-top:4px" />
    </div>
    <div class="form-group">
      <label data-i18n="profile.resume_label">简历</label>
      <div style="margin-top:4px;display:flex;gap:8px;align-items:center">
        <input type="file" id="profileResumeInput" accept=".pdf,.txt,.md,.docx" style="display:none" />
        <button class="btn btn-outline btn-sm" id="profileResumeUploadBtn" data-i18n="settings.resume_upload">上传简历</button>
        <span id="profileResumeStatus" style="font-size:13px;color:var(--ink-3)" data-i18n="settings.resume_none">未上传简历</span>
      </div>
    </div>
    <div class="form-actions">
      <button class="btn btn-outline" id="profileCloseBtn" data-i18n="settings.close">关闭</button>
      <button class="btn" id="profileSaveBtn" data-i18n="profile.save">保存</button>
    </div>
  </div>
</div>

<!-- 弹窗：Agent 人格配置 -->
<div class="modal-overlay" id="agentModal">
  <div class="modal" style="max-width:520px">
    <h2 data-i18n="agent.title">配置 Main Agent</h2>
    <div class="form-group">
      <label data-i18n="agent.preset_label">预设人格</label>
      <div style="display:flex;gap:8px;margin-top:4px" id="agentPresetBtns">
        <button class="btn btn-outline btn-sm agent-preset active" data-profile="friendly" data-i18n="agent.preset_friendly">友好陪伴型</button>
        <button class="btn btn-outline btn-sm agent-preset" data-profile="strict" data-i18n="agent.preset_strict">严格导师型</button>
        <button class="btn btn-outline btn-sm agent-preset" data-profile="wise" data-i18n="agent.preset_wise">睿智学者型</button>
      </div>
    </div>
    <div class="form-group">
      <label data-i18n="agent.api_key_label">DeepSeek API Key</label>
      <div style="display:flex;gap:6px;align-items:center;margin-top:4px">
        <input type="password" id="agentApiKey"
               style="flex:1;padding:8px 12px;border:1px solid var(--line);border-radius:8px;font-size:14px;font-family:monospace" />
        <button class="btn btn-outline btn-sm" id="agentClearKeyBtn"
                style="flex-shrink:0;display:none" data-i18n="agent.clear_key">清除</button>
      </div>
      <div id="agentKeyHint" style="font-size:11px;color:var(--ink-4);margin-top:4px">留空则使用服务器默认配置</div>
    </div>
    <div class="form-group">
      <label data-i18n="agent.base_url_label">DeepSeek Base URL</label>
      <input type="text" id="agentBaseUrl"
             style="width:100%;padding:8px 12px;border:1px solid var(--line);border-radius:8px;font-size:14px;font-family:monospace;margin-top:4px"
             placeholder="https://api.deepseek.com" />
      <div style="font-size:11px;color:var(--ink-4);margin-top:4px" data-i18n="agent.base_url_hint">留空则使用默认地址</div>
    </div>
    <div class="form-group">
      <label data-i18n="agent.custom_label">自定义 System Prompt（可选）</label>
      <textarea id="agentCustomPrompt" rows="6" style="width:100%;padding:10px 12px;border:1px solid var(--line);border-radius:8px;font-size:13px;font-family:monospace;margin-top:4px;resize:vertical"></textarea>
    </div>
    <div class="form-actions">
      <button class="btn btn-outline" id="agentCloseBtn" data-i18n="settings.close">关闭</button>
      <button class="btn" id="agentSaveBtn" data-i18n="agent.save">保存</button>
    </div>
  </div>
</div>

</body>
</html>
